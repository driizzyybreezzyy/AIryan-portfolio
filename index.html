<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0F0C" />

    <!-- Set the theme before paint to avoid a flash of the wrong theme. -->
    <script>
      try {
        var t = localStorage.getItem("airyanfc_theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>

    <title>Aryan Bhavsar — Machine Learning Systems Engineer</title>
    <meta
      name="description"
      content="Aryan Bhavsar — Machine Learning Systems Engineer. I build production AI end to end, from fine-tuning the model to shipping the product. An AIryan FC player-card portfolio."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Aryan Bhavsar — Machine Learning Systems Engineer" />
    <meta
      property="og:description"
      content="AIryan FC 2026 Special. I build production AI end to end — from fine-tuning the model to shipping the product."
    />
    <meta property="og:image" content="/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Aryan Bhavsar — AIryan FC 2026 Special player card" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aryan Bhavsar — Machine Learning Systems Engineer" />
    <meta
      name="twitter:description"
      content="AIryan FC 2026 Special. Production AI, end to end."
    />
    <meta name="twitter:image" content="/og.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
